<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SIVRAJ — Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="app.css"/>
</head>
<body>
<div class="scanline"></div>
<nav class="sidebar" id="appSidebar"></nav>
<div class="main">
  <div class="topbar" id="appTopbar"></div>
  <div class="page">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Reports</div><div class="stat-value cyan">3</div></div>
      <div class="stat-card"><div class="stat-label">This Month</div><div class="stat-value green">2</div></div>
      <div class="stat-card"><div class="stat-label">Avg Findings</div><div class="stat-value">7.7</div></div>
    </div>
    <div class="panel">
      <div class="panel-header"><div class="panel-title"><span class="panel-title-dot"></span>REPORT ARCHIVE</div></div>
      <div class="panel-body" style="overflow-x:auto">
        <table class="tbl">
          <thead><tr><th>Date</th><th>Target</th><th>Type</th><th>Findings</th><th>Critical</th><th>Format</th><th>Actions</th></tr></thead>
          <tbody>
            <tr><td>2026-05-04</td><td style="color:var(--cyan)">acme.com</td><td>Full Pentest</td><td>12</td><td><span class="tbl-badge badge-crit">2</span></td><td>PDF, HTML</td><td><button class="btn btn-cyan" style="font-size:.6rem">View</button> <button class="btn" style="font-size:.6rem">📥 PDF</button></td></tr>
            <tr><td>2026-04-28</td><td style="color:var(--cyan)">test.io</td><td>Web Only</td><td>7</td><td><span class="tbl-badge badge-high">1</span></td><td>PDF, MD</td><td><button class="btn btn-cyan" style="font-size:.6rem">View</button> <button class="btn" style="font-size:.6rem">📥 PDF</button></td></tr>
            <tr><td>2026-04-15</td><td style="color:var(--cyan)">lab.local</td><td>Network</td><td>4</td><td>0</td><td>HTML</td><td><button class="btn btn-cyan" style="font-size:.6rem">View</button> <button class="btn" style="font-size:.6rem">📥 PDF</button></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="app.js"></script>
<script>document.addEventListener('DOMContentLoaded',()=>{renderTopbar('REPORTS','📊','<button class="topbar-btn topbar-btn-primary" onclick="alert(\'Generate report — select target and scope\')">+ Generate New</button>')});</script>
</body>
</html>
