<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SIVRAJ — Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="app.css"/>
</head>
<body>
<div class="scanline"></div>
<nav class="sidebar" id="appSidebar"></nav>
<div class="main">
  <div class="topbar" id="appTopbar"></div>
  <div class="page">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Target</div><div class="stat-value cyan" id="opTarget">—</div></div>
      <div class="stat-card"><div class="stat-label">Progress</div><div class="stat-value amber" id="opProgress">0%</div><div class="progress" style="margin-top:6px"><div class="progress-bar" id="opBar" style="width:0%"></div></div></div>
      <div class="stat-card"><div class="stat-label">Elapsed</div><div class="stat-value" id="opTime">—</div></div>
      <div class="stat-card"><div class="stat-label">Findings</div><div class="stat-value red" id="opFindings">0</div></div>
    </div>
    <div class="panel">
      <div class="panel-header"><div class="panel-title"><span class="panel-title-dot"></span>PHASE CHAIN</div></div>
      <div class="panel-body"><div class="phase-chain" id="phaseChain"></div></div>
    </div>
    <div class="panel" style="margin-top:12px">
      <div class="panel-header">
        <div class="panel-title"><span class="panel-title-dot"></span>LIVE OUTPUT</div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-cyan" onclick="exportResults()">📥 Export</button>
          <button class="btn" onclick="newScan()">🔍 New Scan</button>
        </div>
      </div>
      <div class="panel-body" id="opsResults" style="max-height:500px;overflow-y:auto;font-family:var(--mono);font-size:.75rem">
        <div style="color:var(--text3);padding:2rem;text-align:center">No active operation — click "+ New Operation" to begin</div>
      </div>
    </div>
    <div class="panel" style="margin-top:12px">
      <div class="panel-header"><div class="panel-title"><span class="panel-title-dot"></span>OPERATION HISTORY</div></div>
      <div class="panel-body" style="overflow-x:auto">
        <table class="tbl">
          <thead><tr><th>Date</th><th>Target</th><th>Type</th><th>Findings</th><th>Duration</th><th>Status</th></tr></thead>
          <tbody id="opsHistory"></tbody>
        </table>
        <div id="opsHistoryEmpty" style="color:var(--text3);font-family:var(--mono);font-size:.8rem;padding:2rem;text-align:center">No operations yet</div>
      </div>
    </div>
  </div>
</div>
<script src="app.js"></script>
<script src="api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  renderTopbar('OPERATIONS', '🎯', '<button class="topbar-btn topbar-btn-primary" onclick="newOp()">+ New Operation</button>');

  const current = lsGet('currentOp', null);
  const history = lsGet('opsHistory', []);

  // Phase chain
  const phases = [
    { name:'Recon', status: current ? (current.progress > 20 ? 'done' : 'active') : 'pending' },
    { name:'Scanning', status: current ? (current.progress > 40 ? 'done' : current.progress > 20 ? 'active' : 'pending') : 'pending' },
    { name:'Exploit', status: current ? (current.progress > 60 ? 'done' : current.progress > 40 ? 'active' : 'pending') : 'pending' },
    { name:'Privesc', status: current ? (current.progress > 80 ? 'done' : current.progress > 60 ? 'active' : 'pending') : 'pending' },
    { name:'Report', status: current ? (current.progress >= 100 ? 'done' : current.progress > 80 ? 'active' : 'pending') : 'pending' },
  ];
  const icons = { done:'✅', active:'🔄', pending:'⬜' };
  document.getElementById('phaseChain').innerHTML = phases.map((p,i) =>
    `<div class="phase-node ${p.status}">${icons[p.status]} ${p.name}</div>${i < phases.length-1 ? '<span class="phase-arrow">→</span>' : ''}`
  ).join('');

  if (current) {
    document.getElementById('opTarget').textContent = current.target;
    document.getElementById('opProgress').textContent = current.progress + '%';
    document.getElementById('opBar').style.width = current.progress + '%';
    document.getElementById('opTime').textContent = current.elapsed || '—';
    document.getElementById('opFindings').textContent = current.findings || 0;
    if (current.output) {
      document.getElementById('opsResults').innerHTML = current.output.map(line =>
        `<div style="padding:2px 0;color:var(--text2)">${line}</div>`
      ).join('');
    }
  }

  // History (from localStorage only — real data)
  if (history.length > 0) {
    document.getElementById('opsHistoryEmpty').style.display = 'none';
    document.getElementById('opsHistory').innerHTML = history.map(h => `
      <tr>
        <td>${h.date}</td><td style="color:var(--cyan)">${h.target}</td><td>${h.type}</td>
        <td><span class="tbl-badge ${h.findings > 8 ? 'badge-high' : 'badge-med'}">${h.findings}</span></td>
        <td>${h.duration}</td><td><span class="tbl-badge badge-low">${h.status}</span></td>
      </tr>
    `).join('');
  }
});

function newOp() {
  const t = prompt('Target domain/IP for new operation:');
  if (t) { lsSet('currentOp', { target: t, progress: 0, elapsed: '0h 0m', findings: 0, output: [] }); location.reload(); }
}
function exportResults() { alert('Export coming soon — connect to SIVRAJ API for live data'); }
function newScan() { newOp(); }
</script>
</body>
</html>
