<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SIVRAJ — Hardware Fleet</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="app.css"/>
<style>
.hw-detail{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.2rem;margin-top:12px}
.hw-detail-title{font-family:var(--mono);font-size:.85rem;font-weight:700;color:var(--cyan);margin-bottom:.8rem}
.hw-detail-row{display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid var(--border);font-size:.78rem}
.hw-detail-row:last-child{border:none}
.hw-detail-k{color:var(--text3)}
.hw-detail-v{color:var(--text);font-family:var(--mono)}
.hw-empty{color:var(--text3);font-family:var(--mono);font-size:.8rem;padding:2rem;text-align:center}
</style>
</head>
<body>
<div class="scanline"></div>
<nav class="sidebar" id="appSidebar"></nav>
<div class="main">
  <div class="topbar" id="appTopbar"></div>
  <div class="page">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Devices</div><div class="stat-value cyan" id="hwTotal">—</div></div>
      <div class="stat-card"><div class="stat-label">Online</div><div class="stat-value green" id="hwOnline">—</div></div>
      <div class="stat-card"><div class="stat-label">Offline</div><div class="stat-value red" id="hwOffline">—</div></div>
      <div class="stat-card"><div class="stat-label">Alerts</div><div class="stat-value amber" id="hwAlerts">—</div></div>
    </div>
    <div class="panel">
      <div class="panel-header"><div class="panel-title"><span class="panel-title-dot"></span>ESP32 FLEET</div><button class="topbar-btn topbar-btn-primary" onclick="addDevice()" style="font-size:.65rem">+ Add Device</button></div>
      <div class="panel-body" style="overflow-x:auto">
        <table class="tbl" id="hwTable">
          <thead><tr><th>Device</th><th>Status</th><th>Mode</th><th>IP</th><th>Last Seen</th><th>Actions</th></tr></thead>
          <tbody id="hwBody"></tbody>
        </table>
        <div id="hwEmpty" class="hw-empty">No devices registered — add your ESP32 devices to begin monitoring</div>
      </div>
    </div>
    <div class="hw-detail" id="hwDetail" style="display:none">
      <div class="hw-detail-title" id="hwDetailName">Device Detail</div>
      <div id="hwDetailBody"></div>
      <div style="display:flex;gap:6px;margin-top:.8rem">
        <button class="btn btn-cyan" onclick="pingDevice()">Ping</button>
        <button class="btn btn-red" onclick="rebootDevice()">Reboot</button>
      </div>
    </div>
  </div>
</div>
<script src="app.js"></script>
<script src="api.js"></script>
<script>
let devices = lsGet('esp32_devices', []);

function render() {
  document.getElementById('hwTotal').textContent = devices.length || '0';
  document.getElementById('hwOnline').textContent = devices.filter(d => d.status === 'online').length;
  document.getElementById('hwOffline').textContent = devices.filter(d => d.status !== 'online').length;
  document.getElementById('hwAlerts').textContent = '0';

  if (devices.length === 0) {
    document.getElementById('hwBody').innerHTML = '';
    document.getElementById('hwEmpty').style.display = 'block';
    return;
  }

  document.getElementById('hwEmpty').style.display = 'none';
  document.getElementById('hwBody').innerHTML = devices.map((d, i) => `
    <tr onclick="selectDevice(${i})" style="cursor:pointer">
      <td style="font-weight:600">${d.name}</td>
      <td><span class="tbl-badge ${d.status === 'online' ? 'badge-low' : 'badge-crit'}">${d.status === 'online' ? '🟢 Online' : '🔴 Offline'}</span></td>
      <td>${d.mode || '—'}</td>
      <td style="font-family:var(--mono)">${d.ip || '—'}</td>
      <td>${d.lastSeen || '—'}</td>
      <td><button class="btn btn-cyan" style="font-size:.6rem" onclick="event.stopPropagation();selectDevice(${i})">View</button> <button class="btn btn-red" style="font-size:.6rem" onclick="event.stopPropagation();delDevice(${i})">✕</button></td>
    </tr>
  `).join('');
}

document.addEventListener('DOMContentLoaded', () => {
  renderTopbar('HARDWARE', '📡', '');
  render();
});

function addDevice() {
  const name = prompt('Device name (e.g., ESP32-1):');
  if (!name) return;
  const ip = prompt('IP address (e.g., 10.0.0.51):') || '—';
  const mode = prompt('Mode (Network Scan / Deauth Monitor / Sensor):') || '—';
  devices.push({ name, ip, mode, status: 'offline', lastSeen: '—' });
  lsSet('esp32_devices', devices);
  render();
}

function delDevice(i) {
  if (confirm('Remove device?')) { devices.splice(i, 1); lsSet('esp32_devices', devices); render(); }
}

function selectDevice(i) {
  const d = devices[i];
  document.getElementById('hwDetail').style.display = 'block';
  document.getElementById('hwDetailName').textContent = d.name + ' — Detail';
  document.getElementById('hwDetailBody').innerHTML = `
    <div class="hw-detail-row"><span class="hw-detail-k">📡 Mode</span><span class="hw-detail-v">${d.mode || '—'}</span></div>
    <div class="hw-detail-row"><span class="hw-detail-k">🌐 IP</span><span class="hw-detail-v">${d.ip || '—'}</span></div>
    <div class="hw-detail-row"><span class="hw-detail-k">📶 Status</span><span class="hw-detail-v">${d.status || '—'}</span></div>
    <div class="hw-detail-row"><span class="hw-detail-k">🕐 Last Seen</span><span class="hw-detail-v">${d.lastSeen || '—'}</span></div>
  `;
}

function pingDevice() { alert('Ping: Connect ESP32 via MQTT to enable live communication'); }
function rebootDevice() { alert('Reboot: Connect ESP32 via MQTT to send reboot command'); }
</script>
</body>
</html>
