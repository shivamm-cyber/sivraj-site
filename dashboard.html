<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SIVRAJ — Command Center</title>
<meta name="description" content="SIVRAJ CIC — Autonomous Cybersecurity Intelligence Command Center"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="app.css"/>
</head>
<body>
<div class="scanline"></div>
<nav class="sidebar" id="appSidebar"></nav>
<div class="main">
  <div class="topbar" id="appTopbar"></div>
  <div class="page" id="dashPage">

    <!-- STATUS BAR -->
    <div class="dash-status-bar">
      <div class="dash-status-item"><span class="dash-status-dot" id="statusDot"></span><span id="statusText">CONNECTING...</span></div>
      <div class="dash-status-item">UPTIME <span id="dashUptime" class="dash-status-val">—</span></div>
      <div class="dash-status-item">VERSION <span class="dash-status-val" id="dashVersion">—</span></div>
      <div class="dash-status-item">TOOLS <span class="dash-status-val" id="dashTools">—</span></div>
    </div>

    <!-- TOP STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Active Target</div>
        <div class="stat-value cyan" id="activeTarget">NONE</div>
        <div class="stat-sub"><button class="btn btn-cyan" onclick="setTarget()" style="margin-top:6px">Set Target →</button></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Providers</div>
        <div class="stat-value green" id="providerCount">—</div>
        <div class="stat-sub" id="providerSub">Waiting for data...</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Requests</div>
        <div class="stat-value amber" id="totalRequests">—</div>
        <div class="stat-sub" id="successRate">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Fastest Provider</div>
        <div class="stat-value" id="fastestProvider">—</div>
        <div class="stat-sub" id="fastestLatency">—</div>
      </div>
    </div>

    <!-- TWO COLUMN LAYOUT -->
    <div class="dash-grid">
      <!-- LEFT: QUICK ACTIONS + NEURAL -->
      <div class="dash-col">
        <!-- QUICK ACTIONS -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title"><span class="panel-title-dot"></span>QUICK ACTIONS</div>
          </div>
          <div class="panel-body" style="display:flex;flex-wrap:wrap;gap:8px">
            <button class="btn btn-cyan" onclick="quickAction('scan')">🔍 Quick Scan</button>
            <button class="btn btn-cyan" onclick="quickAction('breach')">📧 Breach Check</button>
            <button class="btn btn-cyan" onclick="quickAction('osint')">🌐 OSINT Lookup</button>
            <button class="btn btn-cyan" onclick="quickAction('report')">📊 New Report</button>
            <button class="btn btn-cyan" onclick="quickAction('recon')">⚡ Full Recon</button>
            <button class="btn btn-cyan" onclick="quickAction('pentest')">🔓 Web Pentest</button>
          </div>
          <div class="panel-footer">
            <span style="font-size:.65rem;color:var(--text3);font-family:var(--mono)">Last: <span id="lastCmd">—</span></span>
          </div>
        </div>

        <!-- NEURAL STATUS (REAL provider data) -->
        <div class="panel" style="margin-top:12px">
          <div class="panel-header">
            <div class="panel-title"><span class="panel-title-dot"></span>PROVIDER LATENCY</div>
            <span style="font-size:.6rem;font-family:var(--mono)" id="neuralStatus">⏳ Loading</span>
          </div>
          <div class="panel-body" id="neuralBars">
            <div style="color:var(--text3);font-size:.75rem;font-family:var(--mono);padding:1rem;text-align:center">Waiting for provider data...</div>
          </div>
        </div>
      </div>

      <!-- RIGHT: REAL ACTIVITY LOG -->
      <div class="dash-col">
        <!-- SYSTEM LOG LIVE (REAL) -->
        <div class="panel">
          <div class="panel-header" style="background:var(--bg)">
            <div class="panel-title">
              <span class="term-dot td-r" style="width:7px;height:7px"></span>
              <span class="term-dot td-y" style="width:7px;height:7px"></span>
              <span class="term-dot td-g" style="width:7px;height:7px"></span>
              <span style="margin-left:4px">SYSTEM LOG</span>
            </div>
            <span style="font-size:.6rem;font-family:var(--mono)" id="logStatus">⏳ Connecting</span>
          </div>
          <div class="panel-body" style="font-family:var(--mono);font-size:.72rem;max-height:500px;overflow-y:auto;background:var(--bg)" id="syslogLive">
            <div class="syslog-line"><span class="ts">[--:--:--]</span><span class="tag tag-system">SYSTEM</span><span class="msg">Connecting to SIVRAJ agent...</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
.dash-status-bar{display:flex;gap:16px;padding:.6rem 1rem;border-radius:8px;background:var(--bg2);border:1px solid var(--border);margin-bottom:1.5rem;flex-wrap:wrap}
.dash-status-item{font-family:var(--mono);font-size:.68rem;color:var(--text3);display:flex;align-items:center;gap:6px}
.dash-status-val{color:var(--text2)}
.dash-status-dot{width:6px;height:6px;border-radius:50%}
.dot-online{background:var(--green);box-shadow:0 0 8px rgba(16,185,129,0.5);animation:s-pulse 3s ease-in-out infinite}
.dot-offline{background:var(--red);box-shadow:0 0 8px rgba(239,68,68,0.5);animation:s-pulse 2s ease-in-out infinite}
.dot-connecting{background:var(--amber);animation:s-pulse 1s ease-in-out infinite}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dash-col{display:flex;flex-direction:column}
.neural-row{display:flex;align-items:center;gap:10px;margin-bottom:.6rem}
.neural-name{font-family:var(--mono);font-size:.72rem;color:var(--text2);width:100px;flex-shrink:0}
.neural-bar-wrap{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.neural-bar{height:100%;border-radius:3px;transition:width 1s ease}
.neural-ms{font-family:var(--mono);font-size:.68rem;color:var(--text3);width:55px;text-align:right}
.neural-badge{font-size:.55rem;padding:1px 6px;border-radius:100px;font-family:var(--mono);font-weight:600}
.neural-meta{font-family:var(--mono);font-size:.6rem;color:var(--text3)}
.syslog-line{display:flex;gap:6px;padding:2px 0;color:var(--text3);font-size:.72rem}
.syslog-line .ts{color:var(--text3);flex-shrink:0}
.syslog-line .tag{font-weight:600;width:55px;flex-shrink:0}
.syslog-line .msg{color:var(--text2);flex:1}
.tag-stt{color:#60a5fa}.tag-llm{color:var(--cyan)}.tag-tool{color:var(--green)}.tag-esp32{color:var(--amber)}.tag-system{color:var(--text)}.tag-cic{color:var(--purple)}.tag-error{color:var(--red)}.tag-auth{color:#a78bfa}
@media(max-width:900px){.dash-grid{grid-template-columns:1fr}}
</style>

<script src="app.js"></script>
<script src="api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  renderTopbar('DASHBOARD', '◆', '<button class="topbar-btn topbar-btn-primary" onclick="location.href=\'/terminal\'">▸ Terminal</button>');

  // Restore active target from localStorage
  const savedTarget = lsGet('activeTarget', null);
  if (savedTarget) document.getElementById('activeTarget').textContent = savedTarget;

  // ─── Main data loop — poll every 5 seconds ─────────────────
  async function refreshDashboard() {
    const status = await api.getStatus();

    if (!status) {
      // OFFLINE
      document.getElementById('statusDot').className = 'dash-status-dot dot-offline';
      document.getElementById('statusText').textContent = 'AGENT OFFLINE';
      document.getElementById('dashUptime').textContent = '—';
      document.getElementById('dashVersion').textContent = '—';
      document.getElementById('dashTools').textContent = '—';
      document.getElementById('providerCount').textContent = '—';
      document.getElementById('providerSub').textContent = 'Agent not running';
      document.getElementById('totalRequests').textContent = '—';
      document.getElementById('successRate').textContent = '—';
      document.getElementById('fastestProvider').textContent = '—';
      document.getElementById('fastestLatency').textContent = '—';
      document.getElementById('neuralStatus').innerHTML = '<span style="color:var(--red)">● OFFLINE</span>';
      document.getElementById('logStatus').innerHTML = '<span style="color:var(--red)">● OFFLINE</span>';
      showOfflineBanner();
      return;
    }

    // ONLINE — populate with REAL data
    hideOfflineBanner();
    document.getElementById('statusDot').className = 'dash-status-dot dot-online';
    document.getElementById('statusText').textContent = 'SYSTEM ONLINE';
    document.getElementById('dashUptime').textContent = formatUptime(status.uptime);
    document.getElementById('dashVersion').textContent = status.version || 'v4.0';
    document.getElementById('dashTools').textContent = status.toolsLoaded || '—';

    // Provider stats
    const providers = status.providers || [];
    document.getElementById('providerCount').textContent = providers.length;
    document.getElementById('providerSub').textContent = providers.length > 0
      ? providers.map(p => p.name).join(', ')
      : 'No providers active';

    // Telemetry
    if (status.telemetry) {
      document.getElementById('totalRequests').textContent = status.telemetry.totalRequests;
      document.getElementById('successRate').textContent = `${status.telemetry.successRate}% success rate`;
    }

    // Fastest
    if (status.fastestProvider) {
      document.getElementById('fastestProvider').textContent = status.fastestProvider;
      document.getElementById('fastestLatency').textContent = `~${status.fastestLatency}ms`;
    } else {
      document.getElementById('fastestProvider').textContent = '—';
      document.getElementById('fastestLatency').textContent = 'No data yet';
    }

    // Neural bars (REAL latency data)
    if (providers.length > 0) {
      document.getElementById('neuralStatus').innerHTML = '<span style="color:var(--green)">● LIVE</span>';
      const maxMs = Math.max(500, ...providers.map(p => p.avgMs));
      const colors = ['var(--green)', 'var(--cyan)', 'var(--purple)', 'var(--amber)', 'var(--text2)', 'var(--red)'];
      document.getElementById('neuralBars').innerHTML = providers.map((p, i) => `
        <div class="neural-row">
          <span class="neural-name">${p.name}</span>
          <div class="neural-bar-wrap"><div class="neural-bar" style="width:${(p.avgMs / maxMs) * 100}%;background:${colors[i % colors.length]}"></div></div>
          <span class="neural-ms">${p.avgMs}ms</span>
          ${i === 0 ? '<span class="neural-badge" style="background:rgba(16,185,129,0.12);color:var(--green);border:1px solid rgba(16,185,129,0.2)">FASTEST</span>' : ''}
        </div>
        <div class="neural-meta" style="margin-bottom:.8rem;margin-left:110px">${p.requests} calls · ${p.successRate}% success · health: ${p.healthScore}/100</div>
      `).join('');
    } else {
      document.getElementById('neuralBars').innerHTML = '<div style="color:var(--text3);font-size:.75rem;font-family:var(--mono);padding:1rem;text-align:center">No provider data yet — make a request to populate</div>';
    }
  }

  // ─── Real log polling ──────────────────────────────────────
  async function refreshLogs() {
    const data = await api.getLogs(30);
    const logEl = document.getElementById('syslogLive');

    if (data.logs.length === 0) {
      if (!api.isOnline()) {
        logEl.innerHTML = '<div class="syslog-line"><span class="ts">[--:--:--]</span><span class="tag tag-system">SYSTEM</span><span class="msg">Agent offline — no logs available</span></div>';
      }
      return;
    }

    document.getElementById('logStatus').innerHTML = '<span style="color:var(--green)">● LIVE</span>';
    const tagCls = (src) => {
      const map = { STT: 'tag-stt', LLM: 'tag-llm', TOOL: 'tag-tool', ESP32: 'tag-esp32', SYSTEM: 'tag-system', CIC: 'tag-cic', AUTH: 'tag-auth', ERROR: 'tag-error' };
      return map[src] || 'tag-system';
    };

    logEl.innerHTML = data.logs.map(l => `
      <div class="syslog-line">
        <span class="ts">[${l.ts}]</span>
        <span class="tag ${tagCls(l.src)}">${l.src}</span>
        <span class="msg">${l.msg}</span>
      </div>
    `).join('');
    logEl.scrollTop = logEl.scrollHeight;
  }

  // Initial load + polling
  refreshDashboard();
  refreshLogs();
  setInterval(refreshDashboard, 5000);
  setInterval(refreshLogs, 3000);
});

// ─── Quick Actions (REAL — sends to agent) ───────────────────
async function quickAction(type) {
  const target = document.getElementById('activeTarget').textContent;
  if (target === 'NONE' && ['scan', 'osint', 'recon', 'pentest'].includes(type)) {
    const t = prompt('Enter target domain/IP first:');
    if (!t) return;
    document.getElementById('activeTarget').textContent = t;
    lsSet('activeTarget', t);
  }

  const currentTarget = document.getElementById('activeTarget').textContent;
  const commands = {
    scan: { cmd: 'network_scan', args: { target: currentTarget } },
    breach: { cmd: 'breach_check', args: { target: prompt('Email to check:') } },
    osint: { cmd: 'osint_lookup', args: { target: currentTarget } },
    report: { cmd: 'generate_report', args: { target: currentTarget } },
    recon: { cmd: 'workflow_full_recon', args: { target: currentTarget } },
    pentest: { cmd: 'workflow_web_pentest', args: { target: currentTarget } },
  };

  const c = commands[type];
  if (!c || !c.args?.target) return;

  document.getElementById('lastCmd').textContent = `${c.cmd} → ${c.args.target} (running...)`;
  const result = await api.runCommand(c.cmd, c.args);
  if (result.error) {
    document.getElementById('lastCmd').textContent = `${c.cmd} → FAILED: ${result.error}`;
  } else {
    document.getElementById('lastCmd').textContent = `${c.cmd} → complete`;
  }
}

function setTarget() {
  const t = prompt('Enter target domain/IP:');
  if (t) {
    document.getElementById('activeTarget').textContent = t;
    lsSet('activeTarget', t);
  }
}
</script>
</body>
</html>
