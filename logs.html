<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SIVRAJ — System Logs</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="app.css"/>
<style>
.log-viewer{background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;height:calc(100vh - 160px);display:flex;flex-direction:column}
.log-toolbar{display:flex;gap:8px;padding:.6rem 1rem;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap;align-items:center}
.log-body{flex:1;overflow-y:auto;padding:.5rem 1rem;font-family:var(--mono);font-size:.75rem;line-height:1.7}
.log-entry{display:flex;gap:8px;padding:1px 0}
.log-entry:hover{background:var(--surface)}
.log-ts{color:var(--text3);flex-shrink:0;width:80px}
.log-level{flex-shrink:0;width:55px;font-weight:700}
.log-src{flex-shrink:0;width:70px;color:var(--text3)}
.log-msg{color:var(--text2);flex:1}
.lvl-info{color:var(--cyan)}.lvl-warn{color:var(--amber)}.lvl-error{color:var(--red)}.lvl-debug{color:var(--text3)}.lvl-success{color:var(--green)}
.log-empty{color:var(--text3);font-family:var(--mono);font-size:.8rem;padding:3rem;text-align:center}
</style>
</head>
<body>
<div class="scanline"></div>
<nav class="sidebar" id="appSidebar"></nav>
<div class="main">
  <div class="topbar" id="appTopbar"></div>
  <div class="page">
    <div class="log-viewer">
      <div class="log-toolbar">
        <input class="input" id="logSearch" placeholder="Search logs..." style="width:250px;font-size:.75rem"/>
        <select class="select" id="logLevel" style="font-size:.72rem"><option value="all">All Levels</option><option value="INFO">INFO</option><option value="WARN">WARN</option><option value="ERROR">ERROR</option><option value="DEBUG">DEBUG</option><option value="SUCCESS">SUCCESS</option></select>
        <select class="select" id="logSrc" style="font-size:.72rem"><option value="all">All Sources</option><option value="LLM">LLM</option><option value="TOOL">TOOL</option><option value="ESP32">ESP32</option><option value="SYSTEM">SYSTEM</option><option value="CIC">CIC</option><option value="AUTH">AUTH</option></select>
        <button class="btn btn-cyan" onclick="exportLogs()" style="font-size:.65rem">📥 Export</button>
        <span style="font-size:.65rem;color:var(--text3);margin-left:auto;font-family:var(--mono)" id="logCount">0 entries</span>
        <label style="font-size:.65rem;color:var(--text3);display:flex;align-items:center;gap:4px"><input type="checkbox" id="autoScroll" checked/> Auto-scroll</label>
      </div>
      <div class="log-body" id="logBody">
        <div class="log-empty">Connecting to SIVRAJ agent...</div>
      </div>
    </div>
  </div>
</div>
<script src="auth.js"></script>\n<script src="app.js"></script>
<script src="api.js"></script>
<script>
let allLogs = [];

async function refreshLogs() {
  const level = document.getElementById('logLevel').value;
  const src = document.getElementById('logSrc').value;
  const data = await api.getLogs(200, level, src);

  allLogs = data.logs || [];
  renderLogs();
}

function renderLogs() {
  const search = document.getElementById('logSearch').value.toLowerCase();
  const filtered = allLogs.filter(l =>
    l.msg.toLowerCase().includes(search) || l.src.toLowerCase().includes(search)
  );

  document.getElementById('logCount').textContent = `${filtered.length} entries`;

  if (filtered.length === 0) {
    document.getElementById('logBody').innerHTML = api.isOnline()
      ? '<div class="log-empty">No log entries match your filter</div>'
      : '<div class="log-empty">🔴 SIVRAJ agent offline — no logs available<br><br><span style="font-size:.7rem">Start: <code>cd sivraj && npm run dev</code></span></div>';
    return;
  }

  const lvlCls = l => l === 'ERROR' ? 'lvl-error' : l === 'WARN' ? 'lvl-warn' : l === 'SUCCESS' ? 'lvl-success' : l === 'DEBUG' ? 'lvl-debug' : 'lvl-info';
  document.getElementById('logBody').innerHTML = filtered.map(l =>
    `<div class="log-entry"><span class="log-ts">[${l.ts}]</span><span class="log-level ${lvlCls(l.level)}">${l.level}</span><span class="log-src">${l.src}</span><span class="log-msg">${l.msg}</span></div>`
  ).join('');

  if (document.getElementById('autoScroll').checked) {
    const b = document.getElementById('logBody');
    b.scrollTop = b.scrollHeight;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  renderTopbar('SYSTEM LOGS', '📜', '');
  refreshLogs();
  document.getElementById('logSearch').addEventListener('input', renderLogs);
  document.getElementById('logLevel').addEventListener('change', refreshLogs);
  document.getElementById('logSrc').addEventListener('change', refreshLogs);
  // Poll for real logs every 3 seconds
  setInterval(refreshLogs, 3000);
});

function exportLogs() {
  const text = allLogs.map(l => `[${l.ts}] ${l.level} ${l.src} ${l.msg}`).join('\n');
  if (text) {
    navigator.clipboard.writeText(text);
    alert('Logs copied to clipboard!');
  } else {
    alert('No logs to export');
  }
}
</script>
</body>
</html>
