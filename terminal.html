<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SIVRAJ — Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="app.css"/>
</head>
<body>
<div class="scanline"></div>
<nav class="sidebar" id="appSidebar"></nav>
<div class="main">
  <div class="topbar" id="appTopbar"></div>
  <div class="page" style="padding:.5rem">
    <div class="term-wrap">
      <div class="term-bar">
        <span class="term-dot td-r"></span><span class="term-dot td-y"></span><span class="term-dot td-g"></span>
        <span class="term-title">sivraj — terminal — <span id="termSess">session-001</span></span>
        <div style="margin-left:auto;display:flex;gap:6px">
          <button class="btn" onclick="clearTerm()" style="font-size:.6rem">Clear</button>
          <button class="btn" onclick="exportTerm()" style="font-size:.6rem">Export</button>
        </div>
      </div>
      <div class="term-body" id="termBody"></div>
      <div class="term-input-wrap">
        <span class="term-prompt">sivraj ›</span>
        <input class="term-input" id="termInput" placeholder="type a command..." autocomplete="off" spellcheck="false"/>
      </div>
    </div>
  </div>
</div>
<script src="app.js"></script>
<script src="api.js"></script>
<script>
const TERM_HISTORY = [];
let histIdx = -1;

const LOCAL_COMMANDS = {
  help: () => [
    '  ╔══════════════════════════════════════════════════════╗',
    '  ║  SIVRAJ v4.0 — Command Reference                   ║',
    '  ╚══════════════════════════════════════════════════════╝',
    '  help              Show this help',
    '  clear             Clear terminal',
    '  status            Check agent connection',
    '  tools             List all tools',
    '  history           Command history',
    '',
    '  Any other command is sent to the SIVRAJ agent for',
    '  real execution. Examples:',
    '    scan 192.168.1.0/24    → runs network_scan',
    '    osint example.com      → runs osint_lookup',
    '    breach user@email.com  → runs breach_check',
    '    dorking example.com    → runs google_dorking',
    '',
    '  ⚠  Agent must be running on localhost:3000',
  ],
  tools: () => ['  68 tools loaded across 11 categories.', '  Visit /tools for the full searchable arsenal.'],
  history: () => TERM_HISTORY.length ? TERM_HISTORY.map((h,i) => `  ${i+1}. ${h}`) : ['  No commands yet.'],
};

function addLine(text, cls = '') {
  const body = document.getElementById('termBody');
  const div = document.createElement('div');
  div.className = 'term-line' + (cls ? ' ' + cls : '');
  div.textContent = text;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

async function processCmd(raw) {
  const cmd = raw.trim();
  if (!cmd) return;
  TERM_HISTORY.push(cmd);
  histIdx = TERM_HISTORY.length;
  addLine('sivraj › ' + cmd, 'cmd');
  const parts = cmd.split(/\s+/);
  const base = parts[0].toLowerCase();
  const arg = parts.slice(1).join(' ');

  if (base === 'clear') { document.getElementById('termBody').innerHTML = ''; return; }

  // Local commands
  if (LOCAL_COMMANDS[base]) { LOCAL_COMMANDS[base]().forEach(l => addLine(l)); return; }

  // Status — check real connection
  if (base === 'status') {
    addLine('  Checking agent connection...', 'info');
    const status = await api.getStatus();
    if (status) {
      addLine('  ┌─ SYSTEM STATUS ─────────────────────┐');
      addLine(`  │ Status:    ONLINE                    │`);
      addLine(`  │ Uptime:    ${formatUptime(status.uptime).padEnd(27)}│`);
      addLine(`  │ Tools:     ${String(status.toolsLoaded).padEnd(27)}│`);
      addLine(`  │ Providers: ${String(status.providers?.length || 0).padEnd(27)}│`);
      if (status.fastestProvider) {
        addLine(`  │ Fastest:   ${(status.fastestProvider + ' (' + status.fastestLatency + 'ms)').padEnd(27)}│`);
      }
      addLine('  └──────────────────────────────────────┘');
    } else {
      addLine('  ┌─ SYSTEM STATUS ─────────────────────┐');
      addLine('  │ Status:    🔴 OFFLINE                │');
      addLine('  │ Start:     cd sivraj && npm run dev   │');
      addLine('  └──────────────────────────────────────┘');
    }
    return;
  }

  // Map common commands to tool names
  const toolMap = {
    scan: 'network_scan', nmap: 'network_scan',
    osint: 'osint_lookup',
    breach: 'breach_check',
    dorking: 'google_dorking',
    recon: 'workflow_full_recon',
    pentest: 'workflow_web_pentest',
    whois: 'whois_lookup',
    dns: 'dns_lookup',
    ssl: 'ssl_check',
    headers: 'header_analysis',
    subdomain: 'subdomain_enum',
    tech: 'tech_stack_detect',
  };

  const toolName = toolMap[base] || base;

  // Send REAL command to agent
  addLine(`  Executing: ${toolName} ${arg ? '→ ' + arg : ''}`, 'info');

  const result = await api.runCommand(toolName, { target: arg || undefined });

  if (result.error) {
    if (result.error.includes('fetch')) {
      addLine('  ❌ Agent offline — start with: cd sivraj && npm run dev', 'err');
    } else {
      addLine(`  ❌ Error: ${result.error}`, 'err');
    }
  } else if (result.result) {
    // Display real output
    const lines = result.result.split('\n');
    lines.forEach(l => addLine('  ' + l));
    addLine(`  ✅ ${toolName} complete`, 'cmd');
  } else {
    addLine(`  ✅ ${toolName} complete (no output)`, 'cmd');
  }
}

document.addEventListener('DOMContentLoaded', () => {
  renderTopbar('TERMINAL', '▸', '');
  addLine('╔══════════════════════════════════════════════════════╗');
  addLine('║  SIVRAJ v4.0 — Autonomous Intelligence Terminal     ║');
  addLine("║  Type 'help' for available commands                  ║");
  addLine('║  All commands execute LIVE via the SIVRAJ agent      ║');
  addLine('╚══════════════════════════════════════════════════════╝');
  addLine('');

  const input = document.getElementById('termInput');
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { processCmd(input.value); input.value = ''; }
    if (e.key === 'ArrowUp') { e.preventDefault(); if (histIdx > 0) { histIdx--; input.value = TERM_HISTORY[histIdx]; } }
    if (e.key === 'ArrowDown') { e.preventDefault(); if (histIdx < TERM_HISTORY.length-1) { histIdx++; input.value = TERM_HISTORY[histIdx]; } else { histIdx = TERM_HISTORY.length; input.value = ''; } }
  });
  input.focus();
});

function clearTerm() { document.getElementById('termBody').innerHTML = ''; }
function exportTerm() { const lines = [...document.querySelectorAll('.term-line')].map(l => l.textContent).join('\n'); navigator.clipboard.writeText(lines); alert('Terminal output copied!'); }
</script>
</body>
</html>
